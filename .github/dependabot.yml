version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      pydantic-stack:
        patterns: ["pydantic*"]
      dev-tooling:
        patterns: ["ruff", "mypy*", "pytest*", "pre-commit"]
      docs:
        patterns: ["mkdocs*", "griffe*"]
